<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FINO Mobile App · v13</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#F5F7FB;font-family:'Roboto',system-ui,sans-serif}
*{box-sizing:border-box}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="app-screens.jsx"></script>
<script type="text/babel">
function App(){
  return (
    <DesignCanvas title="FINO Mobile App · v13" subtitle="FIRMMIT Intelligent Nutrient Optimizer · for Strawberry · 13 screens · dual-mode">
      <DCSection id="entry" title="공통 진입 — Common entry">
        <DCArtboard id="splash" label="01 Splash" width={428} height={920}><Phone hideNav><ScrSplash/></Phone></DCArtboard>
        <DCArtboard id="lang" label="02 Language" width={428} height={920}><Phone hideNav><ScrLanguage/></Phone></DCArtboard>
        <DCArtboard id="onb" label="03 Onboarding" width={428} height={920}><Phone hideNav><ScrOnboarding/></Phone></DCArtboard>
        <DCArtboard id="mode" label="04 Mode select" width={428} height={920}><Phone hideNav><ScrModeSelect/></Phone></DCArtboard>
      </DCSection>

      <DCSection id="nursery" title="육묘장 모드 — Nursery (green)">
        <DCArtboard id="nur-home" label="05 육묘장 홈 · S2" width={428} height={920}><Phone navActive="home" navMode="nursery"><ScrNurseryHome stageIdx={2}/></Phone></DCArtboard>
        <DCArtboard id="nur-rx" label="06 육묘장 처방 · S2" width={428} height={920}><Phone navActive="rx" navMode="nursery"><ScrNurseryRx stageIdx={2}/></Phone></DCArtboard>
        <DCArtboard id="nur-guide" label="07 조제 가이드 (green)" width={428} height={920}><Phone navActive="guide" navMode="nursery"><ScrGuide mode="nursery"/></Phone></DCArtboard>
        <DCArtboard id="nur-log" label="08 자묘 기록" width={428} height={920}><Phone navActive="log" navMode="nursery"><ScrNurseryLog/></Phone></DCArtboard>
      </DCSection>

      <DCSection id="main" title="본격재배 모드 — Main crop (blue)">
        <DCArtboard id="home-win" label="09 본격재배 · 겨울" width={428} height={920}><Phone navActive="home"><ScrHome seasonMonth={2} stageIdx={2} date="3월 18일"/></Phone></DCArtboard>
        <DCArtboard id="home-sum" label="09b · 여름" width={428} height={920}><Phone navActive="home"><ScrHome seasonMonth={6} stageIdx={0} date="7월 15일"/></Phone></DCArtboard>
        <DCArtboard id="rx" label="10 본격재배 처방" width={428} height={920}><Phone navActive="rx"><ScrRx/></Phone></DCArtboard>
        <DCArtboard id="guide-main" label="11 조제 가이드 (blue)" width={428} height={920}><Phone navActive="guide"><ScrGuide mode="main"/></Phone></DCArtboard>
        <DCArtboard id="log" label="12 수확 기록" width={428} height={920}><Phone navActive="log"><ScrLog/></Phone></DCArtboard>
      </DCSection>

      <DCSection id="common" title="공통 관리 — Shared">
        <DCArtboard id="water" label="13 원수 수질" width={428} height={920}><Phone hideNav><ScrWater/></Phone></DCArtboard>
        <DCArtboard id="set-main" label="14 설정 · 본격재배" width={428} height={920}><Phone navActive="set"><ScrSettings mode="main"/></Phone></DCArtboard>
        <DCArtboard id="set-nur" label="14b 설정 · 육묘장" width={428} height={920}><Phone navActive="set" navMode="nursery"><ScrSettings mode="nursery"/></Phone></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
